# config/data_types.yaml
data_types:
  scalar_site:
    label: Water Properties (Scalar)
    data_class: scalar
    natural_view: site
    description: >
      Site-centric tracking. Dynamically absorbs all categories not claimed
      by complex file-archive plugins.

  hydrophone:
    label: Hydrophones
    data_class: complex
    natural_view: instrument
    category_prefixes: [HYDROPHONE]
    archive_extensions: [fft, flac, mat]
    expected_files_per_day: 288
    availability_days: 7

  seismometer:
    label: Seismometers
    data_class: complex
    natural_view: instrument
    # 🕵️ ADDED BBS AND SPS TO MATCH THE TRUE ONC DATABASE CODES
    category_prefixes: [SEISMOMETER, BOTPR, BBS, SPS]
    archive_extensions: [mseed]
    expected_files_per_day: 24
    availability_days: 7

  adcp:
    label: ADCPs
    data_class: complex
    natural_view: instrument
    category_prefixes: [ADCP]
    archive_extensions: [rdi, nc]
    expected_files_per_day: 24
    availability_days: 7